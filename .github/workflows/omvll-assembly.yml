name: Assembly Encryption with O-MVLL

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest  # Menentukan runner menggunakan Ubuntu

    steps:
      # Step 1: Checkout code using checkout@v4
      - name: Checkout repository
        uses: actions/checkout@v4  # Menggunakan version 4 dari checkout

      # Step 2: Install dependencies
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake python3 python3-pip git build-essential ninja-build \
            libspdlog-dev python3-dev pybind11-dev clang  # Menginstal semua dependensi yang diperlukan

      # Step 3: Clone O-MVLL repository
      - name: Clone O-MVLL repository
        run: git clone https://github.com/open-obfuscator/o-mvll.git omvll  # Mengambil repositori O-MVLL

      # Step 4: Build O-MVLL plugin
      - name: Build O-MVLL plugin
        run: |
          # Menavigasi ke direktori O-MVLL yang baru dikloning
          cd omvll

          # Membuat direktori build
          mkdir build
          cd build

          # Menjalankan CMake dari dalam direktori build
          cmake ..
          cmake --build .  # Membangun O-MVLL plugin

      # Step 5: Compile and obfuscate assembly code
      - name: Compile and Obfuscate Assembly Code
        run: |
          ASM_FILE=src/main.s  # Path ke file Assembly yang ingin dienkripsi
          PLUGIN_PATH=$(pwd)/omvll/build/src/libOMVLL.so  # Path ke plugin O-MVLL

          # Menggunakan clang untuk mengompilasi dan mengenkripsi kode Assembly
          clang -fpass-plugin=$PLUGIN_PATH -O2 $ASM_FILE -o app-obfuscated  # Opsi -O2 untuk optimasi

      # Step 6: Upload obfuscated binary (optional)
      - name: Upload obfuscated binary
        uses: actions/upload-artifact@v4  # Mengunggah hasil kompilasi
        with:
          name: obfuscated-assembly
          path: app-obfuscated  # Menentukan lokasi file hasil obfuscation
